{% extends 'base.html' %}
{% block title %}预约服务{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4">
                <h4 class="mb-4"><i class="bi bi-calendar-check"></i> 预约：{{ service.name }}</h4>
                <div class="alert alert-info">
                    <strong>商家：</strong>{{ service.provider.username }}<br>
                    <strong>价格：</strong>¥{{ service.price }}<br>
                    <strong>时长：</strong>{{ service.duration }} 分钟
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">宠物名</label>
                        <input type="text" name="pet_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">预约日期</label>
                        <input type="date" name="appointment_date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">预约时间</label>
                        <input type="time" name="appointment_time" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">备注</label>
                        <textarea name="remark" class="form-control" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">确认预约</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
