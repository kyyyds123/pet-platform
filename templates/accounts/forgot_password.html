{% extends 'base.html' %}
{% block title %}忘记密码{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card mt-5">
            <div class="card-body p-4">
                <h4 class="text-center mb-4"><i class="bi bi-key"></i> 忘记密码</h4>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">新密码</label>
                        <input type="password" name="new_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认新密码</label>
                        <input type="password" name="new_password2" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">重置密码</button>
                    <p class="text-center mt-3 mb-0"><a href="{% url 'accounts:login' %}">返回登录</a></p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
