{% extends 'base.html' %}
{% block title %}添加健康记录{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4">
                <h4 class="mb-4"><i class="bi bi-clipboard-plus"></i> 为 {{ pet.name }} 添加记录</h4>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">记录类型</label>
                        <select name="record_type" class="form-select">
                            <option value="vaccine">疫苗</option>
                            <option value="checkup">体检</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">名称</label>
                        <input type="text" name="name" class="form-control" required placeholder="如：狂犬疫苗">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">日期</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">下次日期（设置提醒）</label>
                        <input type="date" name="next_date" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">医院</label>
                        <input type="text" name="hospital" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">备注</label>
                        <textarea name="notes" class="form-control" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">添加记录</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
